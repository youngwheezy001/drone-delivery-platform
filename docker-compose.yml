version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: drone_db
    environment:
      POSTGRES_USER: drone_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: drone_mission_control
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata: