version: '3.8'

services:
  # 1. ENTERPRISE DATABASE (POSTGRESQL)
  postgres:
    image: postgres:15-alpine
    container_name: drone_db
    environment:
      POSTGRES_USER: drone_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: drone_mission_control
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone_admin -d drone_mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND API (FASTAPI)
  backend:
    build: ./backend
    container_name: drone_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://drone_admin:${POSTGRES_PASSWORD:-secure_password_123}@postgres:5432/drone_mission_control
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. MISSION CONTROL DASHBOARD (NEXT.JS)
  frontend:
    build: ./frontend
    container_name: drone_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata: